<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Pipeline Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>ML Pipeline Dashboard</h1>
        </header>

        <!-- Main Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Airflow</h3>
                <a href="http://localhost:8080" target="_blank" class="service-link">Открыть Airflow →</a>
            </div>

            <div class="stat-card">
                <h3>MLflow</h3>
                <a href="http://localhost:5050" target="_blank" class="service-link">Открыть MLflow →</a>
            </div>
        </div>

        <div class="section">
        <h2>Алгоритмы понижения размерности</h2>

        <!-- PCA секция -->
        <div class="algorithm-section">
            <div class="algorithm-header">
                <div class="parameter-row">
                    <input type="checkbox" id="pcaCheckbox" class="algorithm-checkbox">
                    <label for="pcaCheckbox" class="parameter-label algorithm-name">PCA</label>
                </div>
            </div>

            <div class="algorithm-parameters" id="pcaParameters">
                <div class="parameter-row pca-components-row">
                    <label for="pcaComponents" class="parameter-label">Количество компонентов:</label>
                    <input type="number" id="pcaComponents" class="parameter-input"
                           min="1" max="1000" value="2" step="1">
                </div>
            </div>
        </div>

        <div class="algorithm-section">
            <div class="algorithm-header">
                <div class="parameter-row">
                    <input type="checkbox" id="TDACheckbox" class="algorithm-checkbox">
                    <label for="TDACheckbox" class="parameter-label algorithm-name">TDA</label>
                </div>
            </div>
        </div>

        <!-- UMAP секция -->
        <div class="algorithm-section">
            <div class="algorithm-header">
                <div class="parameter-row">
                    <input type="checkbox" id="umapCheckbox" class="algorithm-checkbox">
                    <label for="umapCheckbox" class="parameter-label algorithm-name">UMAP</label>
                </div>
            </div>

            <div class="algorithm-parameters" id="umapParameters">
                <div class="parameter-row">
                    <label for="umapNeighbors" class="parameter-label">n_neighbors:</label>
                    <input type="number" id="umapNeighbors" class="parameter-input"
                           min="2" max="200" value="15" step="1">
                </div>

                <!-- min_dist -->
                <div class="parameter-row">
                    <label for="umapMinDist" class="parameter-label">min_dist:</label>
                    <input type="number" id="umapMinDist" class="parameter-input"
                           min="0.0" max="0.99" value="0.1" step="0.01">
                </div>

                <!-- n_components -->
                <div class="parameter-row">
                    <label for="umapComponents" class="parameter-label">n_components:</label>
                    <input type="number" id="umapComponents" class="parameter-input"
                           min="1" max="100" value="2" step="1">
                </div>

                <!-- metric -->
                <div class="parameter-row">
                    <label for="umapMetric" class="parameter-label">metric:</label>
                    <select id="umapMetric" class="parameter-select">
                        <option value="euclidean" selected>euclidean</option>
                        <option value="manhattan">manhattan</option>
                        <option value="chebyshev">chebyshev</option>
                        <option value="minkowski">minkowski</option>
                        <option value="canberra">canberra</option>
                        <option value="braycurtis">braycurtis</option>
                        <option value="cosine">cosine</option>
                        <option value="correlation">correlation</option>
                    </select>
                </div>

                <!-- spread -->
                <div class="parameter-row">
                    <label for="umapSpread" class="parameter-label">spread:</label>
                    <input type="number" id="umapSpread" class="parameter-input"
                           min="0.5" max="5.0" value="1.0" step="0.1">
                </div>

                <!-- low_memory -->
                <div class="parameter-row">
                    <label for="umapLowMemory" class="parameter-label">low_memory:</label>
                    <select id="umapLowMemory" class="parameter-select">
                        <option value="true" selected>True</option>
                        <option value="false">False</option>
                    </select>
                </div>

                <!-- init -->
                <div class="parameter-row">
                    <label for="umapInit" class="parameter-label">init:</label>
                    <select id="umapInit" class="parameter-select">
                        <option value="spectral" selected>spectral</option>
                        <option value="random">random</option>
                        <option value="pca">pca</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

        <!-- Quick Actions -->
        <div class="section">
            <h2>Быстрые действия</h2>
            <div class="actions-grid">
                <button class="btn" onclick="window.location.href='http://localhost:8080'">
                    Запустить пайплайн
                </button>
                <button class="btn" onclick="refreshData()">
                    Обновить данные
                </button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
